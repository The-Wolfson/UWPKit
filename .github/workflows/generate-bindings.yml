name: Generate Swift Bindings

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Bindings
        shell: pwsh
        run: ./generate-bindings.ps1

      - name: Commit
        uses: EndBug/add-and-commit@v10
